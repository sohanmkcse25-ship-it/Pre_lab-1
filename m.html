<!DOCTYPE html>
<html>
<head>
    <title>Iframe Example</title>
</head>

<body>

<h2>Embedded Webpages Side by Side</h2>

<table>
  <tr>
    <td>
      <iframe 
          src="https://www.wikipedia.org"
          width="300" 
          height="300">
      </iframe>
    </td>
    <td>
      <iframe
          src="https://animesuge.com.in/anime/one-piece/"
          width="300"
          height="300">
      </iframe>
    </td>
  </tr>
</table>

<br><br>

<h2>Embedded Map</h2>

<iframe
    src="https://www.google.com/maps?q=Nagpur&output=embed"
    width="300"
    height="300">
</iframe>

</body>
</html>
